<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Capibara — Admin</title>
  <link rel="stylesheet" href="/style/base.css">
  <link rel="stylesheet" href="/style/buttons.css">
  <link rel="stylesheet" href="/style/navbar.css">
  <link rel="stylesheet" href="/style/components.css">
  <link rel="stylesheet" href="/style/toast.css">
  <link rel="stylesheet" href="/style/admin.css">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20,300,0,0">
</head>
<body>

<div id="navbar-root"></div>
<script src="/src/navbar.js"></script>
<script>CAPIBARA_NAVBAR.renderAdmin('sources');</script>

<main class="page-content">

  <nav class="breadcrumb">
    <a href="/admin" class="breadcrumb-link">Admin</a>
    <span class="breadcrumb-sep">/</span>
    <span class="breadcrumb-current">Fuentes</span>
  </nav>

  <h1 class="admin-title">Gestión de fuentes</h1>

  <!-- Buscador + acciones principales -->
  <div class="search-row">
    <div class="search-wrap">
      <input class="admin-search" id="search-input" placeholder="Buscar fuentes…">
      <button class="search-clear" id="search-clear" title="Borrar búsqueda">×</button>
    </div>
    <button class="filter-pill" id="btn-new-source">Nueva fuente</button>
    <button class="filter-pill" id="btn-publish">Publicar</button>
  </div>

  <!-- Filtros de estado + actualizar + nueva fuente -->
  <div class="filter-row" style="margin-top:20px">
    <div class="filter-pills" id="status-pills">
      <button class="filter-pill" data-value="ok">
        <span class="dot dot-ok"></span><span id="count-ok">0</span>en línea
      </button>
      <button class="filter-pill" data-value="error">
        <span class="dot dot-error"></span><span id="count-error">0</span>sin respuesta
      </button>
      <button class="filter-pill" data-value="unverified">
        <span class="dot dot-unverified"></span><span id="count-unverified">0</span>sin verificar
      </button>
    </div>
    <button class="filter-pill" id="btn-refresh" title="Actualizar"><span class="material-symbols-outlined refresh-icon">refresh</span>Actualizar</button>
  </div>

  <!-- Filtros de formato -->

  <!-- Lista de fuentes en cascada -->
  <div class="sources-list" id="sources-list"></div>

</main>

<script src="/config/app.js"></script>
<script src="/vocab/status.js"></script>
<script src="/vocab/formats.js"></script>
<script src="/vocab/domains.js"></script>
<script src="/vocab/frequencies.js"></script>
  <script src="/vocab/countries.js"></script>
<script src="/src/api.js"></script>
<script src="/src/toast.js"></script>
<script src="/src/utils.js"></script>
<script src="/src/auth.js"></script>
<script src="/src/progress.js"></script>
<script src="/src/sources.js"></script>

<script>
(async () => {
  'use strict';

  const UTILS   = window.CAPIBARA_UTILS;
  const SOURCES = window.CAPIBARA_SOURCES;
  const AUTH    = window.CAPIBARA_AUTH;
  const API     = window.CAPIBARA_API;
  const TOAST   = window.CAPIBARA_TOAST;
  const STATUS  = window.CAPIBARA_STATUS;
  const DOM     = window.CAPIBARA_DOMAINS;
  const FREQ    = window.CAPIBARA_FREQUENCIES;
  const FMTS     = window.CAPIBARA_FORMATS;
  const PROGRESS = window.CAPIBARA_PROGRESS;
  const COUNTRIES = window.CAPIBARA_COUNTRIES;

  const user = await AUTH.requireAdmin();
  if (!user) return;
  // ── Estado de filtros (multi-select) ──────────────────────────────

  const activeStatuses = new Set();
  // Fuentes expandidas (set de ids) y datos cargados (map id → data)
  const openSources  = new Set();
  const loadedSources = new Map(); // id → source detail data
  const openLayers   = new Set();
  const loadedFields  = new Map();  // layerId → fields[]
  const loadedLayers  = new Map();  // sourceId → layers[]

  function bindPills(containerId, activeSet) {
    document.querySelectorAll(`#${containerId} .filter-pill`).forEach(btn => {
      btn.addEventListener('click', () => {
        const val = btn.dataset.value;
        if (activeSet.has(val)) { activeSet.delete(val); btn.classList.remove('is-active'); }
        else                    { activeSet.add(val);    btn.classList.add('is-active');    }
        renderSources(window._adminSources);
      });
    });
  }

  bindPills('status-pills', activeStatuses);
  const searchInput = document.getElementById('search-input');
  const searchClear = document.getElementById('search-clear');

  searchInput.addEventListener('input', () => {
    searchClear.style.display = searchInput.value ? 'flex' : 'none';
    renderSources(window._adminSources);
  });

  searchClear.addEventListener('click', () => {
    searchInput.value = '';
    searchClear.style.display = 'none';
    searchInput.focus();
    renderSources(window._adminSources);
  });

  document.getElementById('btn-publish').addEventListener('click', () => openPublishModal());

  document.getElementById('btn-new-source').addEventListener('click', () =>
    SOURCES.openCreateModal()
  );

  document.getElementById('btn-refresh').addEventListener('click', async () => {
    const btn = document.getElementById('btn-refresh');
    btn.classList.add('is-refreshing');
    btn.disabled = true;
    await SOURCES.load();
    btn.classList.remove('is-refreshing');
    btn.disabled = false;
  });

  // ── Modal de edición de capa ──────────────────────────────────────────
  async function openLayerPreviewModal(layer) {
    const overlay = document.createElement('div');
    overlay.className = 'modal-overlay';
    const name = layer.name_alias || layer.name_source;
    overlay.innerHTML = `
      <div class="modal" style="max-width:820px">
        <div class="modal-header">
          <div class="modal-title">Preview — ${UTILS.escHtml(name)}</div>
          <button class="modal-close js-close">
            <span class="material-symbols-outlined" style="font-size:18px;line-height:1">close</span>
          </button>
        </div>
        <div class="modal-body" id="preview-body">
          <div class="inline-loading" style="padding:20px">Cargando datos…</div>
        </div>
        <div class="modal-footer">
          <button class="action-btn js-close">Cerrar</button>
        </div>
      </div>
    `;
    document.body.appendChild(overlay);
    const close = () => overlay.remove();
    overlay.querySelectorAll('.js-close').forEach(b => b.addEventListener('click', close));
    overlay.addEventListener('click', e => { if (e.target === overlay) close(); });

    PROGRESS.start();
    const { data, ok, error } = await API.getLayerSample(layer.id, 5);
    const body = overlay.querySelector('#preview-body');

    if (!ok) {
      PROGRESS.done(true);
      body.innerHTML = `<div style="padding:16px;color:var(--error);font-size:13px">Error al obtener datos: ${UTILS.escHtml(error)}</div>`;
      return;
    }
    PROGRESS.done();

    if (!data.features?.length) {
      body.innerHTML = `<div style="padding:16px;font-size:13px;color:var(--text2)">Sin datos disponibles para esta capa.</div>`;
      return;
    }

    // Construir tabla con las propiedades del primer feature
    const props = data.features[0]?.properties || {};
    const cols   = Object.keys(props).filter(k => k !== 'geometry');

    const thead = cols.map(c => `<th style="padding:7px 12px;white-space:nowrap;font-size:11px;color:var(--text2);font-weight:500;text-align:left;border-bottom:1px solid var(--border)">${UTILS.escHtml(c)}</th>`).join('');
    const rows  = data.features.map(f => {
      const p = f.properties || {};
      const cells = cols.map(c => {
        const v = p[c];
        const s = v == null ? '' : String(v);
        return `<td style="padding:7px 12px;font-size:12px;font-family:var(--font-mono);color:var(--text);border-bottom:1px solid var(--border);max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="${UTILS.escHtml(s)}">${UTILS.escHtml(s.slice(0, 80))}</td>`;
      }).join('');
      return `<tr>${cells}</tr>`;
    }).join('');

    body.innerHTML = `
      <div style="font-size:12px;color:var(--text2);margin-bottom:10px">${data.features.length} features de ${data.total?.toLocaleString('es') || '?'} totales</div>
      <div style="overflow-x:auto">
        <table style="width:100%;border-collapse:collapse">
          <thead><tr>${thead}</tr></thead>
          <tbody>${rows}</tbody>
        </table>
      </div>
    `;
  }

  function openLayerEditModal(layer, block) {
    const overlay = document.createElement('div');
    overlay.className = 'modal-overlay';
    overlay.innerHTML = `
      <div class="modal">
        <div class="modal-header">
          <span class="modal-title">Editar capa</span>
          <button class="modal-close js-close">
            <span class="material-symbols-outlined" style="font-size:18px;line-height:1">close</span>
          </button>
        </div>
        <div class="modal-body">
          <div class="modal-field">
            <label class="modal-label">Nombre de la capa</label>
            <input class="input" value="${UTILS.escHtml(layer.name_source)}" readonly>
          </div>
          <div class="modal-field">
            <label class="modal-label" for="lyr-alias">Alias</label>
            <input class="input" id="lyr-alias" value="${UTILS.escHtml(layer.name_alias || '')}" placeholder="Pasos internacionales de Argentina">
          </div>
          <div class="modal-field">
            <label class="modal-label" for="lyr-domain">Dominio temático</label>
            <div class="dd-wrap">
              <select class="select" id="lyr-domain">
                ${DOM.options()}
              </select>
              <span class="dd-icon">expand_more</span>
            </div>
          </div>
          <div class="modal-field">
            <label class="modal-label" for="lyr-freq">Frecuencia de actualización</label>
            <div class="dd-wrap">
              <select class="select" id="lyr-freq">
                ${FREQ.options()}
              </select>
              <span class="dd-icon">expand_more</span>
            </div>
          </div>
        </div>
        <div class="modal-footer">
          <button class="action-btn js-cancel">Cancelar</button>
          <button class="action-btn primary js-save">Guardar</button>
        </div>
      </div>
    `;

    overlay.querySelector('#lyr-domain').value = layer.domain || '';
    overlay.querySelector('#lyr-freq').value   = layer.update_frequency || 'unknown';

    const close = () => document.body.removeChild(overlay);
    overlay.querySelector('.js-close').addEventListener('click', close);
    overlay.querySelector('.js-cancel').addEventListener('click', close);
    overlay.addEventListener('click', e => { if (e.target === overlay) close(); });

    overlay.querySelector('.js-save').addEventListener('click', async () => {
      const alias  = overlay.querySelector('#lyr-alias').value.trim() || null;
      const domain = overlay.querySelector('#lyr-domain').value || null;
      const freq   = overlay.querySelector('#lyr-freq').value || 'unknown';
      const saveBtn = overlay.querySelector('.js-save');
      saveBtn.disabled = true;

      PROGRESS.start();
      const { ok, error } = await API.updateLayer(layer.id, { name_alias: alias, domain, update_frequency: freq });
      saveBtn.disabled = false;
      if (!ok) { PROGRESS.done(true); TOAST.error('Error', error); return; }
      PROGRESS.done();

      Object.assign(layer, { name_alias: alias, domain, update_frequency: freq });
      // Actualizar nombre en la fila
      if (block) {
        const displayName = alias || layer.name_source;
        const nameEl = block.querySelector('.layer-name');
        if (nameEl) nameEl.textContent = displayName;
        const sourceEl = block.querySelector('.layer-name-source');
        if (alias && !sourceEl) {
          const span = document.createElement('span');
          span.className = 'layer-name-source';
          span.textContent = layer.name_source;
          block.querySelector('.layer-name-wrap')?.appendChild(span);
        } else if (!alias && sourceEl) {
          sourceEl.remove();
        }
      }
      TOAST.ok('Guardado', 'Capa actualizada.');
      close();
    });

    document.body.appendChild(overlay);
  }

  // ── Modal de edición de fuente ────────────────────────────────────────
  function openEditModal(src) {
    const connParams = (() => { try { return typeof src.connection_params === 'string' ? JSON.parse(src.connection_params) : (src.connection_params || {}); } catch { return {}; } })();
    const url = connParams?.url || '';

    const overlay = document.createElement('div');
    overlay.className = 'modal-overlay';
    overlay.innerHTML = `
      <div class="modal">
        <div class="modal-header">
          <span class="modal-title">Editar fuente</span>
          <button class="modal-close js-close"><span class="material-symbols-outlined" style="font-size:18px;line-height:1">close</span></button>
        </div>
        <div class="modal-body">
          ${url ? `<div class="modal-field"><label class="modal-label">URL</label><input class="input input-mono" value="${UTILS.escHtml(url)}" readonly style="font-size:11px"></div>` : ''}
          <div class="modal-field">
            <label class="modal-label">Formato</label>
            <div class="dd-wrap">
              <select class="select" id="edit-format" ${src.data_format ? 'disabled' : ''}>
                <option value="">unknown</option>
                <option value="arcgis_rest">arcgis rest</option>
                <option value="csv">csv</option>
                <option value="geojson">geojson</option>
                <option value="json">json</option>
                <option value="wfs">wfs</option>
              </select>
              <span class="dd-icon">expand_more</span>
            </div>
          </div>
          <div class="modal-field">
            <label class="modal-label">Nombre del servicio</label>
            <input class="input" value="${UTILS.escHtml(src.name_source || '')}" readonly>
          </div>
          <div class="modal-field">
            <label class="modal-label" for="edit-alias">Alias</label>
            <input class="input" id="edit-alias" value="${UTILS.escHtml(src.name_alias || '')}" placeholder="Pasos internacionales">
          </div>
          <div class="modal-field">
            <label class="modal-label">Proveedor del servicio</label>
            <input class="input" value="${UTILS.escHtml(src.provider_source || '')}" readonly>
          </div>
          <div class="modal-field">
            <label class="modal-label" for="edit-provider-alias">Alias</label>
            <input class="input" id="edit-provider-alias" value="${UTILS.escHtml(src.provider_alias || '')}" placeholder="Ministerio de Seguridad Nacional">
          </div>
          <div class="modal-field">
            <label class="modal-label" for="edit-countries">Países</label>
            <select class="select" id="edit-countries" multiple style="height:60px">
              ${COUNTRIES.LIST.map(c => `<option value="${c.code}">${c.name} ${c.code}</option>`).join('')}
            </select>
          </div>
          <div class="modal-field">
            <label class="modal-label" for="edit-notes">Notas internas</label>
            <textarea class="textarea" id="edit-notes" style="height:72px;padding:8px 12px">${UTILS.escHtml(src.notes || '')}</textarea>
          </div>
        </div>
        <div class="modal-footer">
          <button class="action-btn js-cancel">Cancelar</button>
          <button class="action-btn primary js-save">Guardar</button>
        </div>
      </div>
    `;

    // Pre-seleccionar valores actuales
    const formatSelect = overlay.querySelector('#edit-format');
    if (formatSelect) formatSelect.value = src.data_format || '';

    const countriesSelect = overlay.querySelector('#edit-countries');
    if (countriesSelect && src.countries?.length) {
      [...countriesSelect.options].forEach(o => {
        o.selected = src.countries.includes(o.value);
      });
    }

    const close = () => document.body.removeChild(overlay);
    overlay.querySelector('.js-close').addEventListener('click', close);
    overlay.querySelector('.js-cancel').addEventListener('click', close);
    overlay.addEventListener('click', e => { if (e.target === overlay) close(); });

    overlay.querySelector('.js-save').addEventListener('click', async () => {
      const alias          = overlay.querySelector('#edit-alias').value.trim() || null;
      const providerAlias  = overlay.querySelector('#edit-provider-alias').value.trim() || null;
      const countries      = [...overlay.querySelector('#edit-countries').selectedOptions].map(o => o.value);
      const notes          = overlay.querySelector('#edit-notes').value.trim() || null;
      const saveBtn   = overlay.querySelector('.js-save');
      saveBtn.disabled = true;

      const formatSelect = overlay.querySelector('#edit-format');
      const dataFormat = formatSelect.disabled ? src.data_format : (formatSelect.value || null);
      PROGRESS.start();
      const { ok, error } = await API.updateSource(src.id, { name_alias: alias, provider_alias: providerAlias, notes, countries, data_format: dataFormat });
      saveBtn.disabled = false;
      if (!ok) { PROGRESS.done(true); TOAST.error('Error al guardar', error); return; }
      PROGRESS.done();
      API.invalidateSourcesCache();

      // Actualizar caché y UI
      const newFormat = dataFormat || src.data_format;
      Object.assign(src, { name_alias: alias, provider_alias: providerAlias, notes, countries, data_format: newFormat });
      loadedSources.set(src.id, src);
      const blk = document.querySelector(`.source-block[data-id="${src.id}"]`);
      if (blk) blk.querySelector('.source-name').textContent = UTILS.displayName(src);
      TOAST.ok('Guardado', 'Fuente actualizada.');
      close();
    });

    document.body.appendChild(overlay);
  }

  // ── Modal de publicación ─────────────────────────────────────────────────
  function openPublishModal() {
    const overlay = document.createElement('div');
    overlay.className = 'modal-overlay';
    overlay.innerHTML = `
      <div class="modal">
        <div class="modal-header">
          <span class="modal-title">Publicar</span>
          <button class="modal-close js-close">
            <span class="material-symbols-outlined" style="font-size:18px;line-height:1">close</span>
          </button>
        </div>
        <div class="modal-body">

          <!-- Próxima versión -->
          <div class="modal-field">
            <label class="modal-label">Próxima versión</label>
            <div class="pub-version-input-wrap">
              <input class="input input-mono" id="pub-version" readonly style="font-size:12px">
              <button class="pub-lock-btn js-pub-lock" title="Desbloquear para editar">
                <span class="material-symbols-outlined js-lock-icon" style="font-size:16px;line-height:1;font-variation-settings:'FILL' 0,'wght' 300,'GRAD' 0,'opsz' 20">lock</span>
              </button>
            </div>
          </div>

          <!-- Fuentes a publicar -->
          <div class="modal-field">
            <label class="modal-label">Fuentes a publicar</label>
            <div id="pub-sources" class="pub-sources-list">
              <div class="inline-loading" style="padding:10px 12px">Cargando…</div>
            </div>
          </div>

          <!-- Historial -->
          <div class="modal-field">
            <label class="modal-label">Versiones publicadas</label>
            <div id="pub-history" class="pub-history-list">
              <div class="inline-loading" style="padding:10px 12px">Cargando…</div>
            </div>
          </div>

          <!-- Notas internas -->
          <div class="modal-field">
            <label class="modal-label" for="pub-notes">Notas internas</label>
            <textarea class="textarea" id="pub-notes" style="height:72px;padding:8px 12px"></textarea>
          </div>

        </div>
        <div class="modal-footer">
          <button class="action-btn js-cancel">Cancelar</button>
          <button class="action-btn primary" id="pub-btn">Publicar</button>
        </div>
      </div>
    `;

    const close = () => document.body.removeChild(overlay);
    overlay.querySelector('.js-close').addEventListener('click', close);
    overlay.querySelector('.js-cancel').addEventListener('click', close);
    overlay.addEventListener('click', e => { if (e.target === overlay) close(); });

    // ── Lock/unlock de próxima versión ──────────────────────────────────────────────
    overlay.querySelector('.js-pub-lock').addEventListener('click', () => {
      const input  = overlay.querySelector('#pub-version');
      const icon   = overlay.querySelector('.js-lock-icon');
      const locked = input.hasAttribute('readonly');
      input.toggleAttribute('readonly', !locked);
      icon.textContent = locked ? 'lock_open' : 'lock';
      if (locked) input.focus();
    });

    // ── Fuentes a publicar ────────────────────────────────────────────────────────
    async function loadSources() {
      const el = overlay.querySelector('#pub-sources');
      const { data, ok } = await API.getSources();
      if (!ok) { el.innerHTML = `<div style="padding:10px 12px;font-size:12px;color:var(--error)">Error al cargar fuentes.</div>`; return; }

      const sources    = (data.sources || []).filter(s => s.included && s.status === 'ok');
      const withErrors = (data.sources || []).filter(s => s.included && s.status !== 'ok');
      overlay._sourcesWithErrors = withErrors;

      if (!sources.length) {
        el.innerHTML = `<div style="padding:10px 12px;font-size:12px;color:var(--text2)">Sin fuentes activas para publicar.</div>`;
        return;
      }

      el.innerHTML = sources.map(s => {
        const name      = s.name_alias || s.name_source || '(sin nombre)';
        const fmt      = s.data_format || '';
        const pillHtml = fmt ? `<span class="pill pub-format-pill">${fmt.replace('_',' ')}</span>` : '';
        return `
          <div class="pub-source-block" data-source-id="${s.id}">
            <div class="pub-source-row js-pub-src-toggle">
              <div class="pub-source-info">
                <span class="pub-source-name">${UTILS.escHtml(name)}</span>
                ${pillHtml}
              </div>
              <span class="pub-source-count">${s.layers_included ?? '?'} capas</span>
              <span class="layer-arrow pub-source-arrow"></span>
            </div>
            <div class="pub-source-body" id="pub-src-${s.id}"></div>
          </div>
        `;
      }).join('');

      el.querySelectorAll('.js-pub-src-toggle').forEach(row => {
        row.addEventListener('click', async () => {
          const block    = row.closest('.pub-source-block');
          const sourceId = block.dataset.sourceId;
          const body     = block.querySelector('.pub-source-body');
          const isOpen   = block.classList.contains('open');
          block.classList.toggle('open');
          if (!isOpen && !body.dataset.loaded) {
            body.dataset.loaded = '1';
            body.innerHTML = `<div class="inline-loading" style="padding:6px 12px">Cargando capas…</div>`;
            const { data: ld, ok: lok } = await API.getSourceLayers(sourceId);
            if (!lok) { body.innerHTML = `<div style="padding:6px 12px;font-size:12px;color:var(--error)">Error.</div>`; return; }
            const layers = (ld.layers || []).filter(l => l.included);
            // Acumular conteos para warnings al publicar
            overlay._layersSinDominio = (overlay._layersSinDominio || 0) + layers.filter(l => !l.domain).length;
            overlay._layersSinGeom    = (overlay._layersSinGeom    || 0) + layers.filter(l => !l.geometry_type || l.geometry_type === 'UNKNOWN' || l.geometry_type === 'GEOMETRY').length;
            body.innerHTML = layers.length
              ? layers.map(l => {
                  const geom = l.geometry_type ? `<span class="pub-layer-geom">${UTILS.escHtml((l.geometry_type||"").toLowerCase())}</span>` : '';
                  return `<div class="pub-layer-row"><span class="pub-layer-name">${UTILS.escHtml(l.name_alias || l.name_source)}</span>${geom}</div>`;
                }).join('')
              : `<div style="padding:6px 12px;font-size:12px;color:var(--text2)">Sin capas incluidas.</div>`;
          }
        });
      });
    }

    // ── Historial de versiones ──────────────────────────────────────────────────
    async function loadHistory() {
      const el = overlay.querySelector('#pub-history');
      const { data, ok } = await API.getPublications();

      if (!ok || !data?.publications?.length) {
        el.innerHTML = `<div style="padding:10px 12px;font-size:12px;color:var(--text2)">Sin publicaciones todavía.</div>`;
        overlay.querySelector('#pub-version').value = 'v1.0.0';
        return;
      }

      const latest = data.publications[0].version_label;
      const match  = latest.match(/^v(\d+)\.(\d+)\.(\d+)$/);
      const next   = match ? `v${match[1]}.${match[2]}.${+match[3] + 1}` : 'v1.0.0';
      overlay.querySelector('#pub-version').value = next;

      el.innerHTML = data.publications.map((p, i) => `
        <div class="pub-version-block" data-pub-id="${p.id}">
          <div class="pub-version-row js-pub-toggle">
            <div class="pub-version-info">
              <span class="pub-version-label">${UTILS.escHtml(p.version_label)}${i === 0 ? ' <span class="pub-version-active">activa</span>' : ''}</span>
              <span class="pub-version-date">${UTILS.formatDate(p.created_at)}</span>
            </div>
            <div class="pub-version-actions">
              <span class="pub-source-count">${p.sources_count ?? '?'} fuentes</span>
              <span class="layer-arrow pub-version-arrow"></span>
            </div>
          </div>
          <div class="pub-version-body"></div>
        </div>
      `).join('');

      el.querySelectorAll('.js-pub-toggle').forEach(row => {
        row.addEventListener('click', async e => {
          const block  = row.closest('.pub-version-block');
          const body   = block.querySelector('.pub-version-body');
          const isOpen = block.classList.contains('open');
          block.classList.toggle('open');
          if (!isOpen && !body.dataset.loaded) {
            body.dataset.loaded = '1';
            const pubId = block.dataset.pubId;
            const pub   = data.publications.find(p => p.id === pubId);
            const isActivePub = pubId === data.publications[0]?.id;
            const notesHtml = pub?.notes ? `<div class="pub-version-notes">${UTILS.escHtml(pub.notes)}</div>` : '';
            body.innerHTML = notesHtml;

            // Fila published_by + Eliminar
            const metaRow = document.createElement('div');
            metaRow.className = 'pub-version-meta-row';
            metaRow.innerHTML = `
              <div class="pub-version-by">
                <span class="source-provider-label">published_by</span>
                <span class="source-provider-text">${pub?.published_by ? UTILS.escHtml(pub.published_by) : '—'}</span>
              </div>
              <button class="layer-btn danger js-pub-delete" data-pub-id="${pubId}" data-version="${UTILS.escHtml(pub?.version_label||'')}" data-active="${isActivePub}">Eliminar</button>
            `;
            const deleteBtn = metaRow.querySelector('.js-pub-delete');
            deleteBtn.addEventListener('click', async e => {
              e.stopPropagation();
              const version  = deleteBtn.dataset.version;
              const isActive = deleteBtn.dataset.active === 'true';
              const msg = isActive
                ? `¿Eliminar ${version}? Es la versión activa — la API pública quedará sin snapshot hasta la próxima publicación. Esta acción no se puede deshacer.`
                : `¿Eliminar ${version}? Esta acción no se puede deshacer.`;
              if (!confirm(msg)) return;
              deleteBtn.disabled = true;
              PROGRESS.start();
              const { ok, error } = await API.deletePublication(pubId);
              deleteBtn.disabled = false;
              if (!ok) { PROGRESS.done(true); TOAST.error('Error al eliminar', error); return; }
              PROGRESS.done();
              TOAST.ok(`Eliminada ${version}`);
              loadHistory();
            });
            body.appendChild(metaRow);

            // Lista de fuentes del snapshot
            const { data: det, ok: dok } = await API.getPublication(pubId);
            if (dok && det.sources?.length) {
              const srcList = document.createElement('div');
              srcList.className = 'pub-snap-source-list';
              det.sources.forEach(s => {
                const name = s.name_alias || s.name_source;
                const fmt  = s.data_format ? `<span class="pub-layer-geom">${UTILS.escHtml(s.data_format.replace('_',' '))}</span>` : '';
                const row  = document.createElement('div');
                row.className = 'pub-layer-row';
                row.innerHTML = `<span class="pub-layer-name">${UTILS.escHtml(name)}</span>${fmt}`;
                srcList.appendChild(row);
              });
              body.appendChild(srcList);
            }
          }
        });
      });
    }

    // ── Publicar ────────────────────────────────────────────────────────────────────────
    overlay.querySelector('#pub-btn').addEventListener('click', async e => {
      const btn     = e.currentTarget;
      const notes   = overlay.querySelector('#pub-notes').value.trim();
      const version = overlay.querySelector('#pub-version').value.trim();
      const withErrors = overlay._sourcesWithErrors || [];
      if (withErrors.length) {
        const names = withErrors.map(s => s.name_alias || s.name_source).join(', ');
        if (!confirm(`Hay ${withErrors.length} fuente(s) incluida(s) con errores que no se publicarán: ${names}.\n¿Publicar de todas formas?`)) return;
      }

      // 1.2: warning capas sin dominio
      const sinDominio = overlay._layersSinDominio || 0;
      if (sinDominio > 0 && !confirm(`${sinDominio} capa(s) se publicarán sin dominio temático y no aparecerán en filtros por dominio.\n¿Publicar de todas formas?`)) return;

      // 3.3: warning capas con geometría sin resolver
      const sinGeom = overlay._layersSinGeom || 0;
      if (sinGeom > 0 && !confirm(`${sinGeom} capa(s) tienen tipo de geometría sin detectar (GEOMETRY o UNKNOWN). El filtro de cobertura espacial puede no funcionar correctamente para ellas.\n¿Publicar de todas formas?`)) return;
      btn.disabled = true;
      PROGRESS.start();
      const { data, ok, error } = await API.publish({ notes: notes || null, version_label: version || null });
      btn.disabled = false;
      if (!ok) { PROGRESS.done(true); TOAST.error('Error al publicar', error); return; }
      PROGRESS.done();
      TOAST.ok(`Publicado ${data.version}`, `${data.layers_count} capas, ${data.fields_count} campos.`);
      overlay.querySelector('#pub-notes').value = '';
      const input = overlay.querySelector('#pub-version');
      const icon  = overlay.querySelector('.js-lock-icon');
      input.setAttribute('readonly', '');
      icon.textContent = 'lock';
      Promise.all([loadSources(), loadHistory()]);
    });

    Promise.all([loadSources(), loadHistory()]);
    document.body.appendChild(overlay);
  }

  SOURCES.onUpdate(renderSources);
  AUTH.renderNavUser(document.getElementById('nav-user'), user);
  await SOURCES.load();

  // ── renderSources ─────────────────────────────────────────────────

  function renderSources(sources) {
    window._adminSources = sources;
    const list = document.getElementById('sources-list');
    const q    = searchInput.value.toLowerCase();

    // Conteos en pills de estado
    document.getElementById('count-ok').textContent         = sources.filter(s => s.status === 'ok').length;
    document.getElementById('count-error').textContent      = sources.filter(s => s.status === 'error').length;
    document.getElementById('count-unverified').textContent = sources.filter(s => s.status === 'unverified' || !s.status).length;

    const filtered = sources
      .slice()
      .sort((a, b) => {
        const na = (a.name_alias || a.name_source || '').toLowerCase();
        const nb = (b.name_alias || b.name_source || '').toLowerCase();
        return na.localeCompare(nb, 'es');
      })
      .filter(s => {
      const name = ((s.name_alias || s.name_source || '') + ' ' + (s.provider_alias || s.provider_source || '')).toLowerCase();
        if (q && !name.includes(q)) return false;
        if (activeStatuses.size && !activeStatuses.has(s.status)) return false;
          return true;
      });

    if (!filtered.length) {
      list.innerHTML = `<div style="text-align:center;padding:40px;font-size:13px;color:var(--text2)">Sin fuentes${q || activeStatuses.size ? ' para los filtros aplicados' : ''}.</div>`;
      return;
    }

    list.innerHTML = '';
    for (const source of filtered) {
      list.appendChild(buildSourceBlock(source));
    }

    // Restaurar estado abierto
    for (const id of openSources) {
      const block = document.querySelector(`.source-block[data-id="${id}"]`);
      if (block && loadedSources.has(id)) {
        block.classList.add('open');
        renderSourceBody(block, loadedSources.get(id));
        // Restaurar capas: del cache si están disponibles, sino cargar del API
        if (loadedLayers.has(id)) renderLayers(block, id, loadedLayers.get(id));
        else loadLayers(block, id);
      }
    }
  }

  // ── Source block ──────────────────────────────────────────────────

  function buildSourceBlock(source) {
    const name     = UTILS.displayName(source);
    const provider = source.provider_alias || source.provider_source || '';
    const stClass  = `status-${source.status}`;

    const block = document.createElement('div');
    block.className  = `source-block ${stClass}`;
    block.dataset.id = source.id;
    block.innerHTML  = `
      <div class="source-header">
        <input type="checkbox" class="source-check layer-check" ${source.included ? 'checked' : ''}
               title="${source.included ? 'Publicar en API' : 'Excluida de la API'}">
        <span class="dot ${STATUS.get(source.status).dotClass}" title="${STATUS.get(source.status).label}"></span>
        <div class="source-info">
          <span class="source-name">${UTILS.escHtml(name)}</span>
          <div class="source-type-pills-sm">
            ${FMTS.pillHtml(source.data_format)}
            ${source.access_method ? `<span class="pill pill-default">${source.access_method}</span>` : ''}
          </div>
        </div>
        <span class="source-meta-right">${source.layers_total || 0} capas</span>
        <span class="source-arrow"></span>
      </div>
      <div class="source-body"></div>
    `;

    block.querySelector('.source-header').addEventListener('click', () => toggleSource(block, source));

    // Checkbox de inclusión en API — stopPropagation para no abrir el acordeón
    const srcCheck = block.querySelector('.source-check');
    srcCheck.addEventListener('click', e => e.stopPropagation());
    srcCheck.addEventListener('change', async e => {
      const included = e.target.checked ? 1 : 0;
      PROGRESS.start();
      const { ok, error } = await API.updateSource(source.id, { included });
      if (!ok) { PROGRESS.done(true); TOAST.error('Error', error); e.target.checked = !e.target.checked; return; }
      PROGRESS.done();
      source.included = included;
      // habilitar/deshabilitar checkboxes de capas del bloque
      block.querySelectorAll('.layer-check:not(.source-check)').forEach(cb => { cb.disabled = !included; });
    });

    return block;
  }

  async function toggleSource(block, source) {
    const isOpen = block.classList.toggle('open');
    const body   = block.querySelector('.source-body');

    if (!isOpen) { openSources.delete(source.id); return; }
    openSources.add(source.id);

    if (loadedSources.has(source.id)) {
      renderSourceBody(block, loadedSources.get(source.id));
      if (!loadedLayers.has(source.id)) loadLayers(block, source.id);
      else renderLayers(block, source.id, loadedLayers.get(source.id));
      return;
    }

    body.innerHTML = `<div class="inline-loading">Cargando…</div>`;

    // 2.2: getSource y getLayers en paralelo — reduce el tiempo de apertura
    // de la suma de ambos requests al tiempo del más lento.
    const [srcRes, lyrRes] = await Promise.all([
      API.getSource(source.id),
      API.getSourceLayers(source.id),
    ]);

    if (!srcRes.ok) { body.innerHTML = `<div class="inline-loading" style="color:var(--error)">${srcRes.error}</div>`; return; }

    loadedSources.set(source.id, srcRes.data.source);
    renderSourceBody(block, srcRes.data.source);

    if (lyrRes.ok && lyrRes.data?.layers) {
      loadedLayers.set(source.id, lyrRes.data.layers);
      renderLayers(block, source.id, lyrRes.data.layers);
    } else {
      loadLayers(block, source.id); // fallback si falló el paralelo
    }
  }

  function renderSourceBody(block, src) {
    const body = block.querySelector('.source-body');
    const connParams = (() => { try { return typeof src.connection_params === 'string' ? JSON.parse(src.connection_params) : (src.connection_params || {}); } catch { return {}; } })();
    const url = connParams?.url || '';

    const isConnected   = src.status === 'ok';
    const layersTotal   = src.layers_total    || 0;
    const layersActive  = src.layers_included || 0;
    const hasLayers     = layersTotal > 0;

    const infoRows = [
      url           ? `<div class="info-row"><span class="info-label">URL</span><span class="info-value">${UTILS.escHtml(url)}</span></div>` : '',
      src.last_checked ? `<div class="info-row"><span class="info-label">último chequeo</span><span class="info-value">${UTILS.formatDate(src.last_checked)}</span></div>` : '',
      src.error_message ? `<div class="info-row"><span class="info-label">error</span><span class="info-error">${UTILS.escHtml(src.error_message)}</span></div>` : '',
    ].filter(Boolean).join('');

    body.innerHTML = `
      <div class="source-top-bar">
        <div class="source-provider-info">
          ${(src.provider_alias || src.provider_source)
            ? `<span class="source-provider-label">provider</span><span class="source-provider-text">${UTILS.escHtml(src.provider_alias || src.provider_source)}</span>`
            : ''}
        </div>
        <div class="source-top-actions">
          <button class="action-btn js-edit">Editar</button>
          ${src.status !== 'ok' ? '<button class="action-btn js-connect">Conectar</button>' : ''}
          <button class="action-btn js-refresh-source">Actualizar</button>
          <button class="action-btn danger js-delete">Eliminar</button>
        </div>
      </div>
      <div class="layers-section">
        ${!hasLayers
          ? `<div class="inline-loading">Sin capas descubiertas.</div>`
          : `<div class="layers-accordion" id="layers-${src.id}">
               <div class="inline-loading" style="padding:12px 16px">Cargando capas…</div>
             </div>`}
      </div>
    `;

    // Bind acciones
    body.querySelector('.js-edit')?.addEventListener('click', () => openEditModal(src));
    // TODO: el modal de editar capa podría mostrar y editar abstract y bbox
    // (min_lat, max_lat, min_lon, max_lon). Esos datos ya están en DB desde el
    // discover, solo falta exponerlos en la UI.

    body.querySelector('.js-connect')?.addEventListener('click', async e => {
      const btn = e.currentTarget;
      await SOURCES.connect(src.id, btn);
      loadedSources.delete(src.id);
      renderSourceBody(block, { ...src, status: 'ok' });
    });

    body.querySelector('.js-refresh-source')?.addEventListener('click', async e => {
      const btn = e.currentTarget;
      btn.disabled = true;
      // Solo recarga metadatos y capas desde la BD — no llama al servidor WFS externo
      PROGRESS.start();
      const { data, ok } = await API.getSource(src.id);
      if (ok && data) {
        PROGRESS.done();
        loadedSources.set(src.id, data.source);
        loadedLayers.delete(src.id);
        renderSourceBody(block, data.source);
        loadLayers(block, src.id);
      } else {
        PROGRESS.done(true);
      }
      btn.disabled = false;
    });

    body.querySelector('.js-delete')?.addEventListener('click', () => {
      openSources.delete(src.id);
      loadedSources.delete(src.id);
      SOURCES.deleteSource(src.id);
    });

  }

  // ── Carga y render de capas (separado del source body) ─────────────

  async function loadLayers(block, sourceId) {
    // TODO: el endpoint GET /api/admin/layers actualmente no incluye abstract,
    // min_lat, max_lat, min_lon, max_lon en su SELECT. Cuando se quieran mostrar
    // en el panel (resumen de cobertura, abstract por capa), agregar esas columnas
    // al query en api/admin/layers.js.
    const { data, ok } = await API.getSourceLayers(sourceId);
    if (!ok || !data?.layers) return;
    loadedLayers.set(sourceId, data.layers);
    renderLayers(block, sourceId, data.layers);
  }

  function renderLayers(block, sourceId, layers) {
    // TODO: para fuentes con muchas capas (ej. IGN con 192), agregar un input
    // de búsqueda/filtro dentro del acordeón de capas.
    const acc = block.querySelector(`#layers-${sourceId}`);
    if (!acc) return;

    if (!layers.length) {
      acc.innerHTML = `<div class="inline-loading">Sin capas descubiertas.</div>`;
      return;
    }

    const srcIncluded = !!acc.closest('.source-block')?.querySelector('.source-check')?.checked;
    const fragment = document.createDocumentFragment();
    for (const layer of layers) {
      const lb = buildLayerBlock(layer);
      if (!srcIncluded) {
        lb.querySelectorAll('.layer-check').forEach(cb => { cb.disabled = true; });
      }
      fragment.appendChild(lb);
    }
    acc.innerHTML = '';
    acc.appendChild(fragment);
  }

  // ── Layer block ───────────────────────────────────────────────────

  function geomIcon(type) {
    const t = (type || '').toUpperCase();
    if (t.includes('POINT'))   return 'radio_button_unchecked';
    if (t.includes('LINE'))    return 'horizontal_rule';
    if (t.includes('POLYGON')) return 'hexagon';
    // GEOMETRY: el schema XSD declara GeometryPropertyType sin especificar subtipo.
    // TODO: resolver el tipo real haciendo GetFeature con 1 feature y leyendo
    // el tipo de geometría del GeoJSON devuelto. Implementar en getGeomTypes
    // como paso adicional para capas que queden con GEOMETRY tras el batch.
    return 'layers';
  }

  function buildLayerBlock(layer) {
    const displayName = layer.name_alias || layer.name_source;
    const showSource  = !!layer.name_alias; // solo mostrar name_source si hay alias

    const block = document.createElement('div');
    block.className  = 'layer-block';
    block.dataset.id = layer.id;
    block.innerHTML  = `
      <div class="layer-row">
        <input type="checkbox" class="layer-check" ${layer.included ? 'checked' : ''} title="${layer.included ? 'Incluida en API' : 'Excluida de API'}">
        <span class="material-symbols-outlined layer-geom-icon">${geomIcon(layer.geometry_type)}</span>
        <div class="layer-name-wrap">
          <span class="layer-name">${UTILS.escHtml(displayName)}</span>
          ${showSource ? `<span class="layer-name-source">${UTILS.escHtml(layer.name_source)}</span>` : ''}
        </div>
        ${layer.domain ? `<span class="pill">${UTILS.escHtml(layer.domain.replace('_',' '))}</span>` : ''}
        ${layer.update_frequency && layer.update_frequency !== 'unknown' ? `<span class="pill">${UTILS.escHtml(layer.update_frequency.replace('_',' '))}</span>` : ''}
        <button class="action-btn js-layer-preview" title="Preview de datos">Preview</button>
        <button class="action-btn js-layer-edit">Editar</button>
        <span class="layer-arrow"></span>
      </div>
      <div class="layer-body"></div>
    `;

    const check = block.querySelector('.layer-check');
    check.addEventListener('change', async e => {
      e.stopPropagation();
      const included = e.target.checked ? 1 : 0;
      const { ok, error } = await API.updateLayer(layer.id, { included });
      if (!ok) { TOAST.error('Error', error); e.target.checked = !e.target.checked; return; }
      layer.included = included;
      // habilitar/deshabilitar checkboxes de campos del bloque
      block.querySelectorAll('.js-field-check').forEach(cb => { cb.disabled = !included; });
    });

    block.querySelector('.layer-row').addEventListener('click', e => {
      if (e.target.closest('.layer-check') || e.target.closest('.js-layer-edit')) return;
      toggleLayer(block, layer);
    });

    block.querySelector('.js-layer-preview').addEventListener('click', async e => {
      e.stopPropagation();
      await openLayerPreviewModal(layer);
    });

    block.querySelector('.js-layer-edit').addEventListener('click', e => {
      e.stopPropagation();
      openLayerEditModal(layer, block);
    });

    return block;
  }

  function toggleLayer(block, layer) {
    const isOpen = block.classList.toggle('open');
    const body   = block.querySelector('.layer-body');

    if (!isOpen) { openLayers.delete(layer.id); body.innerHTML = ''; return; }
    openLayers.add(layer.id);
    openLayerFields(body, layer);
  }

  async function openLayerFields(body, layer) {
    body.innerHTML = `<div class="inline-loading" style="padding:10px 16px">Cargando campos…</div>`;
    if (loadedFields.has(layer.id)) { renderFields(body, layer.id); return; }
    const { data, ok } = await API.getLayerFields(layer.id);
    if (!ok || !data?.fields?.length) {
      body.innerHTML = `
        <div style="padding:12px 16px;display:flex;align-items:center;justify-content:space-between">
          <span style="font-size:13px;color:var(--text2)">Sin campos descubiertos.</span>
          <button class="field-alias-save js-do-discover-fields">Descubrir campos</button>
        </div>
      `;
      body.querySelector('.js-do-discover-fields').addEventListener('click', async e => {
        const btn = e.currentTarget;
        btn.disabled = true;
        const { data: dd, ok: dok, error: derr } = await API.discoverFields(layer.id);
        if (!dok) { btn.disabled = false; TOAST.error('Error', derr); return; }
        TOAST.ok(dd.added > 0 ? 'Campos descubiertos' : 'Sin campos nuevos', `${dd.added} nuevos.`);
        const { data: fd, ok: fok } = await API.getLayerFields(layer.id);
        btn.disabled = false;
        if (fok && fd?.fields?.length) {
          loadedFields.set(layer.id, fd.fields);
          renderFields(body, layer.id);
        }
      });
      return;
    }
    loadedFields.set(layer.id, data.fields);
    renderFields(body, layer.id);
  }


  function renderFields(body, layerId) {
    const fields = loadedFields.get(layerId) || [];
    if (!fields.length) {
      body.innerHTML = `<div class="inline-loading" style="padding:10px 16px">Sin campos descubiertos.</div>`;
      return;
    }

    body.innerHTML = '';
    const frag = document.createDocumentFragment();

    const layerCheck = body.closest('.layer-block')?.querySelector('.layer-check');
    const layerActive = layerCheck ? (layerCheck.checked && !layerCheck.disabled) : true;

    for (const f of fields) {
      const row = document.createElement('div');
      row.className  = 'field-row';
      row.dataset.id = f.id;
      // Extraer sample_value del metadata del campo
      const fMeta        = (() => { try { return JSON.parse(f.metadata || '{}'); } catch { return {}; } })();
      const sampleVal    = fMeta.sample_value != null ? String(fMeta.sample_value) : null;
      // sample_value: si está en metadata lo mostramos. Ya no hay botón "Muestra"
      // individual — el Preview de la capa muestra todos los valores juntos.
      const sampleHtml = sampleVal != null
        ? `<span class="field-sample" title="${UTILS.escHtml(sampleVal)}">${UTILS.escHtml(sampleVal)}</span>`
        : '';

      row.innerHTML  = `
        <input type="checkbox" class="layer-check js-field-check" ${f.included ? 'checked' : ''} ${layerActive ? '' : 'disabled'}
               title="${f.included ? 'Activo' : 'Inactivo'}">
        <div class="field-name-wrap">
          <span class="field-name">${UTILS.escHtml(f.name_source)}</span>
          <span class="field-type">${f.type || '?'}</span>
        </div>
        ${sampleHtml}
        <div class="field-alias-wrap">
          <input class="field-alias-input js-field-alias" value="${UTILS.escHtml(f.name_alias || '')}" placeholder="alias">
          <button class="field-alias-save js-field-save">Guardar</button>
        </div>
      `;

      row.querySelector('.js-field-check').addEventListener('change', async e => {
        const { ok, error } = await API.updateField(f.id, { included: e.target.checked ? 1 : 0 });
        if (!ok) { TOAST.error('Error', error); e.target.checked = !e.target.checked; }
        else { f.included = e.target.checked ? 1 : 0; }
      });

      row.querySelector('.js-field-save').addEventListener('click', async e => {
        const inp   = row.querySelector('.js-field-alias');
        const alias = inp.value.trim() || null;
        const btn   = e.currentTarget;
        btn.disabled = true;
        const { ok, error } = await API.updateField(f.id, { name_alias: alias });
        btn.disabled = false;
        if (!ok) { TOAST.error('Error', error); return; }
        f.name_alias = alias;
        TOAST.ok('Guardado');
      });

      frag.appendChild(row);
    }

    body.appendChild(frag);
  }

})();
</script>

</body>
</html>
