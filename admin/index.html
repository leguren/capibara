<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Capibara — Admin</title>
  <link rel="stylesheet" href="/style/base.css">
  <link rel="stylesheet" href="/style/buttons.css">
  <link rel="stylesheet" href="/style/components.css">
  <link rel="stylesheet" href="/style/toast.css">
  <link rel="stylesheet" href="/style/admin.css">
</head>
<body>

<nav class="navbar">
  <a href="/admin" class="navbar-brand">Capibara</a>
  <nav class="navbar-nav">
    <a href="/admin" class="navbar-link is-active">Fuentes</a>
    <a href="/publish" class="navbar-link">Publicar</a>
  </nav>
  <div class="navbar-spacer"></div>
  <div class="navbar-user" id="nav-user"></div>
</nav>

<main class="page-content">

  <h1 class="admin-title">Gestión de fuentes</h1>

  <!-- Stats -->
  <div class="stats-row" id="stats-row">
    <div class="stat-card">
      <div class="stat-value" id="stat-connected">—</div>
      <div class="stat-label">fuentes conectadas</div>
    </div>
    <div class="stat-card">
      <div class="stat-value" id="stat-active">—</div>
      <div class="stat-label">fuentes activas</div>
    </div>
    <div class="stat-card">
      <div class="stat-value" id="stat-layers">—</div>
      <div class="stat-label">capas activas</div>
    </div>
  </div>

  <!-- Buscador -->
  <input class="input admin-search" id="search-input" placeholder="Buscar fuentes…">

  <!-- Filtros de estado + botón nueva fuente -->
  <div class="filter-row">
    <div class="filter-pills" id="status-pills">
      <button class="filter-pill" data-value="ok">Conectadas</button>
      <button class="filter-pill" data-value="error">Con error</button>
      <button class="filter-pill" data-value="unverified">Sin verificar</button>
    </div>
    <button class="btn btn-primary" id="btn-new-source">Nueva fuente</button>
  </div>

  <!-- Filtros de formato -->
  <div class="filter-row" style="margin-top:6px">
    <div class="filter-pills" id="format-pills">
      <button class="filter-pill" data-value="wfs">WFS</button>
      <button class="filter-pill" data-value="arcgis_rest">ArcGIS</button>
      <button class="filter-pill" data-value="csv">CSV</button>
      <button class="filter-pill" data-value="geojson">GeoJSON</button>
      <button class="filter-pill" data-value="json">JSON</button>
    </div>
  </div>

  <!-- Lista de fuentes -->
  <div class="sources-list" id="sources-list"></div>

</main>

<!-- Panel lateral -->
<div class="detail-panel" id="detail-panel" style="display:none">
  <div class="detail-panel-header">
    <button class="btn btn-ghost btn-icon" id="close-panel" title="Cerrar">←</button>
    <div style="flex:1;min-width:0">
      <div class="panel-title" id="panel-title"></div>
      <div class="panel-subtitle" id="panel-sub"></div>
    </div>
  </div>
  <div class="detail-panel-body" id="panel-body"></div>
</div>

<script src="/config/app.js"></script>
<script src="/vocab/status.js"></script>
<script src="/vocab/formats.js"></script>
<script src="/vocab/domains.js"></script>
<script src="/vocab/frequencies.js"></script>
<script src="/src/api.js"></script>
<script src="/src/toast.js"></script>
<script src="/src/utils.js"></script>
<script src="/src/auth.js"></script>
<script src="/src/source-card.js"></script>
<script src="/src/sources.js"></script>

<script>
(async () => {
  'use strict';

  const UTILS     = window.CAPIBARA_UTILS;
  const SOURCES   = window.CAPIBARA_SOURCES;
  const CARD      = window.CAPIBARA_SOURCE_CARD;
  const AUTH      = window.CAPIBARA_AUTH;
  const API       = window.CAPIBARA_API;
  const TOAST     = window.CAPIBARA_TOAST;
  const STATUS    = window.CAPIBARA_STATUS;
  const LAYER_ROW = window.CAPIBARA_LAYER_ROW;

  const user = await AUTH.requireAdmin();
  if (!user) return;
  AUTH.renderNavUser(document.getElementById('nav-user'), user);

  // ── Filtros multi-select con pills ───────────────────────────────

  const activeStatuses = new Set();
  const activeFormats  = new Set();

  function bindPills(containerId, activeSet) {
    document.querySelectorAll(`#${containerId} .filter-pill`).forEach(btn => {
      btn.addEventListener('click', () => {
        const val = btn.dataset.value;
        if (activeSet.has(val)) { activeSet.delete(val); btn.classList.remove('is-active'); }
        else                    { activeSet.add(val);    btn.classList.add('is-active');    }
        renderSources(window._adminSources);
      });
    });
  }

  bindPills('status-pills', activeStatuses);
  bindPills('format-pills', activeFormats);

  // Buscador
  document.getElementById('search-input').addEventListener('input', () =>
    renderSources(window._adminSources)
  );

  // Nueva fuente
  document.getElementById('btn-new-source').addEventListener('click', () =>
    SOURCES.openCreateModal()
  );

  // Cerrar panel
  document.getElementById('close-panel').addEventListener('click', () => {
    document.getElementById('detail-panel').style.display = 'none';
    document.querySelectorAll('.source-row.is-active').forEach(r => r.classList.remove('is-active'));
  });

  SOURCES.onUpdate(renderSources);
  await SOURCES.load();

  // ── renderSources ────────────────────────────────────────────────

  function renderSources(sources) {
    window._adminSources = sources;
    const list = document.getElementById('sources-list');
    const q    = document.getElementById('search-input').value.toLowerCase();

    // Stats
    document.getElementById('stat-connected').textContent = sources.filter(s => s.status === 'ok').length;
    document.getElementById('stat-active').textContent    = sources.filter(s => s.included).length;
    document.getElementById('stat-layers').textContent    = sources.reduce((a, s) => a + (s.layers_included || 0), 0);

    const filtered = sources.filter(s => {
      const name = ((s.name_alias || s.name_source || '') + ' ' + (s.provider_alias || s.provider_source || '')).toLowerCase();
      if (q && !name.includes(q)) return false;
      if (activeStatuses.size && !activeStatuses.has(s.status)) return false;
      if (activeFormats.size  && !activeFormats.has(s.data_format)) return false;
      return true;
    });

    if (!filtered.length) {
      list.innerHTML = `<div style="text-align:center;padding:40px;color:var(--text2);font-size:14px">Sin fuentes${q || activeStatuses.size || activeFormats.size ? ' para los filtros aplicados' : ''}.</div>`;
      return;
    }

    list.innerHTML = '';
    for (const source of filtered) {
      const row = CARD.render(source);
      row.addEventListener('click', () => openDetailPanel(source));
      list.appendChild(row);
    }
  }

  // ── Panel de detalle ─────────────────────────────────────────────

  let _currentSourceId = null;

  async function openDetailPanel(source) {
    document.querySelectorAll('.source-row.is-active').forEach(r => r.classList.remove('is-active'));
    document.querySelector(`.source-row[data-id="${source.id}"]`)?.classList.add('is-active');

    const panel = document.getElementById('detail-panel');
    const body  = document.getElementById('panel-body');
    panel.style.display = 'flex';

    document.getElementById('panel-title').textContent = UTILS.displayName(source);
    document.getElementById('panel-sub').textContent   = `${source.data_format?.toUpperCase() || ''} · ${STATUS.get(source.status).label}`;

    _currentSourceId = source.id;
    body.innerHTML   = '<div style="padding:20px;color:var(--text2);font-size:13px">Cargando…</div>';

    const { data, ok, error } = await API.getSource(source.id);
    if (_currentSourceId !== source.id) return;
    if (!ok) {
      body.innerHTML = `<div style="padding:20px;color:var(--error);font-size:13px">${error}</div>`;
      return;
    }

    renderPanel(body, data.source);
  }

  function renderPanel(body, src) {
    const connParams = (() => {
      try { return typeof src.connection_params === 'string' ? JSON.parse(src.connection_params) : (src.connection_params || {}); }
      catch { return {}; }
    })();
    const url = connParams?.url || '';

    const isConnected = src.status === 'ok';
    const hasLayers   = (src.layers?.length || 0) > 0;

    const actionsHtml = `
      ${!isConnected ? `<button class="btn btn-primary btn-sm js-connect">Conectar</button>` : ''}
      ${isConnected  ? `<button class="btn btn-secondary btn-sm js-discover">${hasLayers ? 'Actualizar capas' : 'Descubrir capas'}</button>` : ''}
      <button class="btn btn-ghost btn-sm js-delete" style="margin-left:auto;color:var(--error)">Eliminar</button>
    `;

    const infoHtml = `
      ${url ? `<div class="panel-info-row"><span class="panel-info-label">URL</span><span class="panel-info-value">${UTILS.escHtml(url)}</span></div>` : ''}
      ${src.last_checked ? `<div class="panel-info-row"><span class="panel-info-label">Último chequeo</span><span style="font-size:13px">${UTILS.formatDate(src.last_checked)}</span></div>` : ''}
      ${src.error_message ? `<div class="panel-info-row"><span class="panel-info-label">Error</span><span style="color:var(--error);font-size:12px">${UTILS.escHtml(src.error_message)}</span></div>` : ''}
    `;

    const layers = src.layers || [];
    const includedCount = layers.filter(l => l.included).length;

    const layersHtml = layers.length === 0
      ? `<div style="padding:16px 20px;font-size:13px;color:var(--text2)">Sin capas descubiertas.</div>`
      : `<div class="layer-list-header"><span>${layers.length} capas</span><span>${includedCount} activas</span></div>
         <div id="layers-accordion"></div>`;

    body.innerHTML = `
      <div class="panel-section"><div class="panel-actions">${actionsHtml}</div></div>
      <div class="panel-section">${infoHtml}</div>
      <div>${layersHtml}</div>
    `;

    body.querySelector('.js-connect')?.addEventListener('click', async e => {
      const ok = await SOURCES.connect(src.id, e.currentTarget);
      if (ok) { const { data } = await API.getSource(src.id); if (data) renderPanel(body, data.source); }
    });

    body.querySelector('.js-discover')?.addEventListener('click', async e => {
      await SOURCES.discoverLayers(src.id, e.currentTarget);
      const { data } = await API.getSource(src.id);
      if (data) renderPanel(body, data.source);
    });

    body.querySelector('.js-delete')?.addEventListener('click', () => {
      SOURCES.deleteSource(src.id);
      document.getElementById('detail-panel').style.display = 'none';
    });

    if (layers.length > 0) {
      const accordion = body.querySelector('#layers-accordion');
      for (const layer of layers) accordion.appendChild(LAYER_ROW.render(layer));
    }
  }

})();
</script>

</body>
</html>
