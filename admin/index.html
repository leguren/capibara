<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Capibara — Admin</title>
  <link rel="stylesheet" href="/style/base.css">
  <link rel="stylesheet" href="/style/buttons.css">
  <link rel="stylesheet" href="/style/components.css">
  <link rel="stylesheet" href="/style/toast.css">
  <link rel="stylesheet" href="/style/admin.css">
</head>
<body>

<main class="page-content">

  <h1 class="admin-title">Admin</h1>

  <div class="sources-list">

    <a href="/admin/sources" class="source-block" style="text-decoration:none">
      <div class="source-header">
        <div class="source-info">
          <span class="source-name">Fuentes</span>
          <span class="source-sub">Gestión de fuentes, capas y campos</span>
        </div>
        <span class="source-arrow">▶</span>
      </div>
    </a>

    <a href="/admin/publish" class="source-block" style="text-decoration:none">
      <div class="source-header">
        <div class="source-info">
          <span class="source-name">Publicar</span>
          <span class="source-sub">Snapshots de configuración para la API pública</span>
        </div>
        <span class="source-arrow">▶</span>
      </div>
    </a>

  </div>

</main>

<script src="/config/app.js"></script>
<script src="/src/api.js"></script>
<script src="/src/toast.js"></script>
<script src="/src/utils.js"></script>
<script src="/src/auth.js"></script>
<script>
(async () => {
  const user = await window.CAPIBARA_AUTH.requireAdmin();
  if (!user) return;
})();
</script>

</body>
</html>
