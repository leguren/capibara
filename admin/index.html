<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Capibara — Admin</title>
  <link rel="stylesheet" href="/style/base.css">
  <link rel="stylesheet" href="/style/buttons.css">
  <link rel="stylesheet" href="/style/components.css">
  <link rel="stylesheet" href="/style/toast.css">
  <link rel="stylesheet" href="/style/admin.css">
</head>
<body>

<nav class="navbar">
  <a href="/admin" class="navbar-brand">
    <svg width="24" height="24" viewBox="0 0 40 40" fill="none">
      <rect width="40" height="40" rx="10" fill="#A56A43"/>
      <ellipse cx="20" cy="22" rx="11" ry="8" fill="#F7F3EC"/>
      <ellipse cx="14" cy="20" rx="3" ry="4.5" fill="#EFE9DF"/>
      <ellipse cx="26" cy="20" rx="3" ry="4.5" fill="#EFE9DF"/>
      <circle cx="16" cy="16" r="2" fill="#2E1F17"/>
      <circle cx="24" cy="16" r="2" fill="#2E1F17"/>
    </svg>
    Capibara
  </a>
  <nav class="navbar-nav">
    <a href="/admin" class="navbar-link is-active">Fuentes</a>
    <a href="/publish" class="navbar-link">Publicar</a>
  </nav>
  <div class="navbar-spacer"></div>
  <div class="navbar-user" id="nav-user">
    <div class="skeleton" style="width:80px;height:16px;border-radius:4px"></div>
  </div>
</nav>

<main class="page-content" style="max-width:1200px">

  <div class="page-header">
    <div>
      <div class="page-title">Fuentes de datos</div>
      <div class="page-subtitle">Conectá servicios externos y configurá qué capas y campos sirve la API.</div>
    </div>
    <button class="btn btn-primary" id="btn-new-source">+ Nueva fuente</button>
  </div>

  <!-- Stats globales -->
  <div class="stats-grid" id="stats-grid">
    <div class="stat-card">
      <div class="stat-label">Fuentes</div>
      <div class="stat-value skeleton" style="width:40px;height:28px">&nbsp;</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Capas activas</div>
      <div class="stat-value skeleton" style="width:40px;height:28px">&nbsp;</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Campos activos</div>
      <div class="stat-value skeleton" style="width:40px;height:28px">&nbsp;</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Conectadas</div>
      <div class="stat-value skeleton" style="width:40px;height:28px">&nbsp;</div>
    </div>
  </div>

  <!-- Toolbar -->
  <div class="toolbar">
    <input class="input toolbar-search" id="search-input" placeholder="Buscar fuentes…">
    <select class="select" id="filter-status" style="width:150px">
      <option value="">Todos los estados</option>
      <option value="ok">Conectadas</option>
      <option value="error">Con error</option>
      <option value="unverified">Sin verificar</option>
    </select>
    <select class="select" id="filter-format" style="width:150px">
      <option value="">Todos los formatos</option>
      <option value="wfs">WFS</option>
      <option value="arcgis_rest">ArcGIS REST</option>
      <option value="csv">CSV</option>
      <option value="geojson">GeoJSON</option>
      <option value="json">JSON</option>
    </select>
  </div>

  <!-- Grid de source cards -->
  <div class="sources-grid" id="sources-grid">
    <div class="card skeleton" style="height:110px"></div>
    <div class="card skeleton" style="height:110px"></div>
    <div class="card skeleton" style="height:110px"></div>
  </div>

</main>

<!-- Panel lateral -->
<div class="detail-panel" id="detail-panel" style="display:none">
  <div class="detail-panel-header">
    <button class="btn btn-ghost btn-icon" id="close-panel" title="Cerrar">←</button>
    <div style="flex:1;min-width:0">
      <div class="panel-title" id="panel-title"></div>
      <div class="panel-subtitle" id="panel-sub"></div>
    </div>
  </div>
  <div class="detail-panel-body" id="panel-body"></div>
</div>

<script src="/config/app.js"></script>
<script src="/vocab/status.js"></script>
<script src="/vocab/formats.js"></script>
<script src="/vocab/domains.js"></script>
<script src="/vocab/frequencies.js"></script>
<script src="/src/api.js"></script>
<script src="/src/toast.js"></script>
<script src="/src/utils.js"></script>
<script src="/src/auth.js"></script>
<script src="/src/source-card.js"></script>
<script src="/src/sources.js"></script>

<script>
(async () => {
  'use strict';

  const UTILS   = window.CAPIBARA_UTILS;
  const SOURCES = window.CAPIBARA_SOURCES;
  const CARD    = window.CAPIBARA_SOURCE_CARD;
  const AUTH    = window.CAPIBARA_AUTH;
  const API     = window.CAPIBARA_API;
  const TOAST   = window.CAPIBARA_TOAST;
  const STATUS  = window.CAPIBARA_STATUS;
  const LAYER_ROW = window.CAPIBARA_LAYER_ROW;

  const user = await AUTH.requireAdmin();
  if (!user) return;
  AUTH.renderNavUser(document.getElementById('nav-user'), user);

  // Filtros
  const searchInput  = document.getElementById('search-input');
  const filterStatus = document.getElementById('filter-status');
  const filterFormat = document.getElementById('filter-format');
  [searchInput, filterStatus, filterFormat].forEach(el =>
    el.addEventListener('input', () => renderSources(window._adminSources))
  );

  // Nueva fuente
  document.getElementById('btn-new-source').addEventListener('click', () =>
    SOURCES.openCreateModal()
  );

  // Cerrar panel
  document.getElementById('close-panel').addEventListener('click', () => {
    document.getElementById('detail-panel').style.display = 'none';
    document.querySelectorAll('.source-card.is-active').forEach(c => c.classList.remove('is-active'));
  });

  SOURCES.onUpdate(renderSources);
  await SOURCES.load();

  // ── renderSources ────────────────────────────────────────────────────────

  function renderSources(sources) {
    window._adminSources = sources;
    const grid    = document.getElementById('sources-grid');
    const q       = searchInput.value.toLowerCase();
    const sts     = filterStatus.value;
    const fmt     = filterFormat.value;

    // Stats
    document.getElementById('stats-grid').innerHTML = `
      <div class="stat-card"><div class="stat-label">Fuentes</div><div class="stat-value">${sources.length}</div></div>
      <div class="stat-card"><div class="stat-label">Capas activas</div><div class="stat-value">${sources.reduce((a, s) => a + (s.layers_included || 0), 0)}</div></div>
      <div class="stat-card"><div class="stat-label">Campos activos</div><div class="stat-value">${sources.reduce((a, s) => a + (s.fields_included || 0), 0)}</div></div>
      <div class="stat-card"><div class="stat-label">Conectadas</div><div class="stat-value">${sources.filter(s => s.status === 'ok').length}</div></div>
    `;

    const filtered = sources.filter(s => {
      const name = ((s.name_alias || s.name_source || '') + ' ' + (s.provider_alias || s.provider_source || '')).toLowerCase();
      if (q && !name.includes(q)) return false;
      if (sts && s.status !== sts) return false;
      if (fmt && s.data_format !== fmt) return false;
      return true;
    });

    if (!filtered.length) {
      grid.innerHTML = `
        <div class="empty-state" style="grid-column:1/-1">
          <div class="empty-state-title">Sin fuentes</div>
          <div class="empty-state-desc">Creá tu primera fuente de datos con el botón de arriba.</div>
        </div>`;
      return;
    }

    grid.innerHTML = '';
    for (const source of filtered) {
      const card = CARD.render(source);
      card.addEventListener('click', () => openDetailPanel(source));
      grid.appendChild(card);
    }
  }

  // ── Panel de detalle ─────────────────────────────────────────────────────

  let _currentSourceId = null;

  async function openDetailPanel(source) {
    // Marcar card activa
    document.querySelectorAll('.source-card.is-active').forEach(c => c.classList.remove('is-active'));
    document.querySelector(`.source-card[data-id="${source.id}"]`)?.classList.add('is-active');

    const panel = document.getElementById('detail-panel');
    const body  = document.getElementById('panel-body');
    panel.style.display = 'flex';

    document.getElementById('panel-title').textContent = UTILS.displayName(source);
    document.getElementById('panel-sub').textContent   = `${source.data_format?.toUpperCase() || ''} · ${STATUS.get(source.status).label}`;

    _currentSourceId = source.id;
    body.innerHTML = '<div class="panel-section"><div class="skeleton" style="height:80px;border-radius:6px"></div></div>';

    // Cargar detalle fresco del servidor
    const { data, ok, error } = await API.getSource(source.id);
    if (_currentSourceId !== source.id) return; // usuario abrió otra fuente mientras cargaba
    if (!ok) {
      body.innerHTML = `<div class="panel-section" style="color:var(--error)">${error}</div>`;
      return;
    }

    renderPanel(body, data.source);
  }

  function renderPanel(body, src) {
    const connParams = (() => {
      try { return typeof src.connection_params === 'string' ? JSON.parse(src.connection_params) : src.connection_params; }
      catch { return {}; }
    })();
    const url = connParams?.url || '';

    // ── Acciones según estado ────────────────────────────────────────────
    const isConnected   = src.status === 'ok';
    const hasLayers     = (src.layers?.length || 0) > 0;
    const discoverLabel = hasLayers ? 'Actualizar capas' : 'Descubrir capas';

    const actionsHtml = `
      ${!isConnected ? `<button class="btn btn-primary btn-sm js-connect">Conectar</button>` : ''}
      ${isConnected  ? `<button class="btn btn-secondary btn-sm js-discover">${discoverLabel}</button>` : ''}
      <button class="btn btn-ghost btn-sm js-delete" style="margin-left:auto;color:var(--error)">Eliminar</button>
    `;

    // ── Info de la fuente ────────────────────────────────────────────────
    const infoHtml = `
      ${url ? `<div class="panel-info-row"><span class="panel-info-label">URL</span><span class="panel-info-value">${UTILS.escHtml(url)}</span></div>` : ''}
      ${src.last_checked ? `<div class="panel-info-row"><span class="panel-info-label">Último chequeo</span><span style="font-size:13px">${UTILS.formatDate(src.last_checked)}</span></div>` : ''}
      ${src.error_message ? `<div class="panel-info-row"><span class="panel-info-label">Error</span><span style="color:var(--error);font-size:12px">${UTILS.escHtml(src.error_message)}</span></div>` : ''}
      ${src.notes ? `<div class="panel-info-row"><span class="panel-info-label">Notas</span><span style="font-size:13px">${UTILS.escHtml(src.notes)}</span></div>` : ''}
    `;

    // ── Capas ────────────────────────────────────────────────────────────
    const layers   = src.layers || [];
    const included = layers.filter(l => l.included).length;

    const layersHtml = layers.length === 0
      ? `<div style="padding:16px 20px;font-size:13px;color:var(--text2)">Sin capas descubiertas. Usá el botón "Descubrir capas" para cargarlas.</div>`
      : `<div class="layer-list-header">
           <span>${layers.length} capas</span>
           <span>${included} activas</span>
         </div>
         <div id="layers-accordion"></div>`;

    body.innerHTML = `
      <div class="panel-section">
        <div class="panel-actions">${actionsHtml}</div>
      </div>
      <div class="panel-section">${infoHtml}</div>
      <div id="panel-layers-section">${layersHtml}</div>
    `;

    // Bind acciones
    body.querySelector('.js-connect')?.addEventListener('click', async e => {
      const ok = await SOURCES.connect(src.id, e.currentTarget);
      if (ok) { const { data } = await API.getSource(src.id); if (data) renderPanel(body, data.source); }
    });

    body.querySelector('.js-discover')?.addEventListener('click', async e => {
      const btn = e.currentTarget;
      await SOURCES.discoverLayers(src.id, btn);
      const { data } = await API.getSource(src.id);
      if (data) renderPanel(body, data.source);
    });

    body.querySelector('.js-delete')?.addEventListener('click', () => {
      SOURCES.deleteSource(src.id);
      document.getElementById('detail-panel').style.display = 'none';
    });

    // Renderizar accordion de capas
    if (layers.length > 0) {
      const accordion = body.querySelector('#layers-accordion');
      for (const layer of layers) {
        accordion.appendChild(LAYER_ROW.render(layer));
      }
    }
  }

})();
</script>

</body>
</html>
