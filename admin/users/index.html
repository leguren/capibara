<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Capibara — Usuarios</title>
  <link rel="stylesheet" href="/style/base.css">
  <link rel="stylesheet" href="/style/buttons.css">
  <link rel="stylesheet" href="/style/navbar.css">
  <link rel="stylesheet" href="/style/components.css">
  <link rel="stylesheet" href="/style/toast.css">
  <link rel="stylesheet" href="/style/admin.css">
</head>
<body>

<div id="navbar-root"></div>
<script src="/src/navbar.js"></script>
<script>CAPIBARA_NAVBAR.renderAdmin('users');</script>

<main class="page-content">
  <nav class="breadcrumb">
    <a href="/admin" class="breadcrumb-link">Admin</a>
    <span class="breadcrumb-sep">/</span>
    <span class="breadcrumb-current">Usuarios</span>
  </nav>

  <h1 class="admin-title">Usuarios</h1>
  <div id="users-list"><div class="inline-loading">Cargando…</div></div>
</main>

<script src="/config/app.js"></script>
<script src="/src/api.js"></script>
<script src="/src/toast.js"></script>
<script src="/src/utils.js"></script>
<script src="/src/auth.js"></script>
<script src="/src/progress.js"></script>
<script>
(async () => {
  'use strict';
  const AUTH     = window.CAPIBARA_AUTH;
  const API      = window.CAPIBARA_API;
  const UTILS    = window.CAPIBARA_UTILS;
  const TOAST    = window.CAPIBARA_TOAST;
  const PROGRESS = window.CAPIBARA_PROGRESS;

  const currentUser = await AUTH.requireAdmin();
  if (!currentUser) return;
  AUTH.renderNavUser(document.getElementById('nav-user'), currentUser);

  const el = document.getElementById('users-list');

  // ── Modal de edición de role/tier ────────────────────────────────────────
  function openEditUserModal(u, row) {
    const isSelf = u.id === currentUser.id;

    const overlay = document.createElement('div');
    overlay.className = 'modal-overlay';
    overlay.innerHTML = `
      <div class="modal" style="max-width:420px">
        <div class="modal-header">
          <span class="modal-title">Editar usuario</span>
          <button class="modal-close js-close">×</button>
        </div>
        <div class="modal-body">
          <div class="modal-field">
            <label class="modal-label">Usuario</label>
            <input class="input" value="${UTILS.escHtml(u.name || u.email)}" readonly>
          </div>
          <div class="modal-field">
            <label class="modal-label" for="edit-role">Rol</label>
            <div class="dd-wrap">
              <select class="select" id="edit-role" ${isSelf ? 'disabled' : ''}>
                <option value="user"  ${u.role === 'user'  ? 'selected' : ''}>user</option>
                <option value="admin" ${u.role === 'admin' ? 'selected' : ''}>admin</option>
              </select>
            </div>
            ${isSelf ? '<span class="form-hint">No podés cambiar tu propio rol.</span>' : ''}
          </div>
          <div class="modal-field">
            <label class="modal-label" for="edit-tier">Tier</label>
            <input class="input" id="edit-tier" value="${UTILS.escHtml(u.tier || '')}" placeholder="free, starter, pro… (vacío = sin asignar)">
          </div>
        </div>
        <div class="modal-footer">
          <button class="action-btn js-cancel">Cancelar</button>
          <button class="action-btn primary js-save">Guardar</button>
        </div>
      </div>
    `;

    const close = () => overlay.remove();
    overlay.querySelector('.js-close').addEventListener('click', close);
    overlay.querySelector('.js-cancel').addEventListener('click', close);
    overlay.addEventListener('click', e => { if (e.target === overlay) close(); });

    overlay.querySelector('.js-save').addEventListener('click', async () => {
      const roleSelect = overlay.querySelector('#edit-role');
      const tierInput  = overlay.querySelector('#edit-tier');
      const body = {
        tier: tierInput.value.trim() || null,
      };
      if (!roleSelect.disabled) body.role = roleSelect.value;

      const saveBtn = overlay.querySelector('.js-save');
      saveBtn.disabled = true;
      PROGRESS.start();
      const { ok, error } = await API.updateAdminUser(u.id, body);
      saveBtn.disabled = false;
      if (!ok) { PROGRESS.done(true); TOAST.error('Error al guardar', error); return; }
      PROGRESS.done();

      Object.assign(u, body);
      row.querySelector('.source-sub').textContent =
        `${u.email} · ${u.role}${u.tier ? ' · ' + u.tier : ''}`;
      TOAST.ok('Guardado', 'Usuario actualizado.');
      close();
    });

    document.body.appendChild(overlay);
  }

  // ── Carga y render ────────────────────────────────────────────────────────
  PROGRESS.start();
  const { data, ok } = await API.getAdminUsers();
  PROGRESS.done(!ok);

  if (!ok) { el.innerHTML = '<div class="error-note">Error al cargar usuarios.</div>'; return; }
  if (!data.users?.length) { el.innerHTML = '<div class="muted-note">Sin usuarios registrados.</div>'; return; }

  el.innerHTML = '';
  for (const u of data.users) {
    const row = document.createElement('div');
    row.className = 'source-block admin-list-item';
    row.innerHTML = `
      <div class="source-header source-header--static">
        <div class="source-info">
          <span class="source-name">${UTILS.escHtml(u.name || u.email)}</span>
          <span class="source-sub">${UTILS.escHtml(u.email)} · ${u.role}${u.tier ? ' · ' + UTILS.escHtml(u.tier) : ''}</span>
        </div>
        <div class="row-meta">
          <span>${u.keys_active} key${u.keys_active !== 1 ? 's' : ''} activa${u.keys_active !== 1 ? 's' : ''}</span>
          <span>Último login: ${u.last_login ? UTILS.timeAgo(u.last_login) : '—'}</span>
          <span>Último uso API: ${u.last_api_use ? UTILS.timeAgo(u.last_api_use) : '—'}</span>
          <button class="action-btn js-edit-user">Editar</button>
        </div>
      </div>
    `;
    row.querySelector('.js-edit-user').addEventListener('click', () => openEditUserModal(u, row));
    el.appendChild(row);
  }
})();
</script>

</body>
</html>
