<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Capibara — Usuarios</title>
  <link rel="stylesheet" href="/style/base.css">
  <link rel="stylesheet" href="/style/buttons.css">
  <link rel="stylesheet" href="/style/components.css">
  <link rel="stylesheet" href="/style/toast.css">
  <link rel="stylesheet" href="/style/admin.css">
</head>
<body>

<nav class="navbar">
  <a href="/admin" class="navbar-brand">Capibara</a>
  <div class="navbar-nav">
    <a href="/admin/sources"   class="navbar-link">Fuentes</a>
    <a href="/admin/analytics" class="navbar-link">Analytics</a>
    <a href="/admin/users"     class="navbar-link is-active">Usuarios</a>
    <a href="/admin/keys"      class="navbar-link">Keys</a>
  </div>
  <div class="navbar-spacer"></div>
  <div class="navbar-user" id="nav-user"></div>
</nav>

<main class="page-content admin-content">
  <h1 class="admin-title">Usuarios</h1>
  <div id="users-list"><div class="inline-loading">Cargando…</div></div>
</main>

<script src="/config/app.js"></script>
<script src="/src/api.js"></script>
<script src="/src/toast.js"></script>
<script src="/src/utils.js"></script>
<script src="/src/auth.js"></script>
<script src="/src/progress.js"></script>
<script>
(async () => {
  'use strict';
  const AUTH     = window.CAPIBARA_AUTH;
  const API      = window.CAPIBARA_API;
  const UTILS    = window.CAPIBARA_UTILS;
  const PROGRESS = window.CAPIBARA_PROGRESS;

  const user = await AUTH.requireAdmin();
  if (!user) return;
  AUTH.renderNavUser(document.getElementById('nav-user'), user);

  PROGRESS.start();
  const { data, ok } = await API.getAdminUsers();
  PROGRESS.done(!ok);

  const el = document.getElementById('users-list');
  if (!ok) { el.innerHTML = '<div class="error-note">Error al cargar usuarios.</div>'; return; }

  if (!data.users?.length) { el.innerHTML = '<div class="muted-note">Sin usuarios registrados.</div>'; return; }

  el.innerHTML = data.users.map(u => `
    <div class="source-block admin-list-item">
      <div class="source-header source-header--static">
        <div class="source-info">
          <span class="source-name">${UTILS.escHtml(u.name || u.email)}</span>
          <span class="source-sub">${UTILS.escHtml(u.email)} · ${u.role}</span>
        </div>
        <div class="row-meta">
          <span>${u.keys_active} key${u.keys_active !== 1 ? 's' : ''} activa${u.keys_active !== 1 ? 's' : ''}</span>
          <span>Último login: ${u.last_login ? UTILS.timeAgo(u.last_login) : '—'}</span>
          <span>Último uso API: ${u.last_api_use ? UTILS.timeAgo(u.last_api_use) : '—'}</span>
        </div>
      </div>
    </div>
  `).join('');
})();
</script>

</body>
</html>
