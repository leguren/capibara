<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Capibara — API Keys</title>
  <link rel="stylesheet" href="/style/base.css">
  <link rel="stylesheet" href="/style/buttons.css">
  <link rel="stylesheet" href="/style/components.css">
  <link rel="stylesheet" href="/style/toast.css">
  <link rel="stylesheet" href="/style/admin.css">
</head>
<body>

<nav class="navbar">
  <a href="/admin" class="navbar-brand">Capibara</a>
  <div class="navbar-nav">
    <a href="/admin/sources"   class="navbar-link">Fuentes</a>
    <a href="/admin/analytics" class="navbar-link">Analytics</a>
    <a href="/admin/users"     class="navbar-link">Usuarios</a>
    <a href="/admin/keys"      class="navbar-link is-active">Keys</a>
  </div>
  <div class="navbar-spacer"></div>
  <div class="navbar-user" id="nav-user"></div>
</nav>

<main class="page-content" style="max-width:900px;margin:0 auto">
  <h1 class="admin-title">API Keys</h1>
  <div id="keys-list"><div class="inline-loading">Cargando…</div></div>
</main>

<script src="/config/app.js"></script>
<script src="/src/api.js"></script>
<script src="/src/toast.js"></script>
<script src="/src/utils.js"></script>
<script src="/src/auth.js"></script>
<script src="/src/progress.js"></script>
<script>
(async () => {
  'use strict';
  const AUTH     = window.CAPIBARA_AUTH;
  const API      = window.CAPIBARA_API;
  const UTILS    = window.CAPIBARA_UTILS;
  const TOAST    = window.CAPIBARA_TOAST;
  const PROGRESS = window.CAPIBARA_PROGRESS;

  const user = await AUTH.requireAdmin();
  if (!user) return;
  AUTH.renderNavUser(document.getElementById('nav-user'), user);

  async function load() {
    PROGRESS.start();
    const { data, ok } = await API.getAdminKeys();
    PROGRESS.done(!ok);

    const el = document.getElementById('keys-list');
    if (!ok) { el.innerHTML = '<div style="color:var(--error);font-size:13px">Error al cargar keys.</div>'; return; }
    if (!data.keys?.length) { el.innerHTML = '<div style="font-size:13px;color:var(--text2)">Sin API keys registradas.</div>'; return; }

    el.innerHTML = '';
    for (const k of data.keys) {
      const row = document.createElement('div');
      row.className = 'source-block';
      row.style.marginBottom = '8px';
      row.innerHTML = `
        <div class="source-header" style="cursor:default">
          <div class="source-info">
            <span class="source-name" style="${!k.active ? 'text-decoration:line-through;opacity:0.5' : ''}">${UTILS.escHtml(k.label)}</span>
            <span class="source-sub">
              ${UTILS.escHtml(k.user_name || k.user_email || '—')} ·
              <span class="pill" style="font-size:10px">${k.type}</span>
              ${!k.active ? '<span class="pill" style="font-size:10px;background:var(--error);color:#fff">inactiva</span>' : ''}
            </span>
          </div>
          <div style="display:flex;align-items:center;gap:16px;font-size:12px;color:var(--text2)">
            <span>Creada: ${UTILS.timeAgo(k.created_at)}</span>
            <span>Usado: ${k.last_used_at ? UTILS.timeAgo(k.last_used_at) : 'nunca'}</span>
            ${k.active ? `<button class="action-btn danger js-revoke" data-id="${k.id}" data-label="${UTILS.escHtml(k.label)}">Revocar</button>` : ''}
          </div>
        </div>
      `;
      if (k.active) {
        row.querySelector('.js-revoke').addEventListener('click', async e => {
          const btn   = e.currentTarget;
          const label = btn.dataset.label;
          if (!confirm(`¿Revocar la key "${label}"? Los clientes que la usen dejarán de funcionar.`)) return;
          PROGRESS.start();
          const { ok, error } = await API.revokeAdminKey(btn.dataset.id);
          PROGRESS.done(!ok);
          if (!ok) { TOAST.error('Error al revocar', error); return; }
          TOAST.ok('Key revocada', label);
          await load();
        });
      }
      el.appendChild(row);
    }
  }

  await load();
})();
</script>

</body>
</html>
