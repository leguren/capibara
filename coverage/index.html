<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Capibara — Coverage</title>
  <link rel="stylesheet" href="/style/base.css">
  <link rel="stylesheet" href="/style/buttons.css">
  <link rel="stylesheet" href="/style/navbar.css">
  <link rel="stylesheet" href="/style/components.css">
  <link rel="stylesheet" href="/style/toast.css">
  <link rel="stylesheet" href="/style/coverage.css">
</head>
<body>

<div id="navbar-root"></div>
<script src="/src/navbar.js"></script>
<script>CAPIBARA_NAVBAR.renderClient('coverage');</script>

<main class="page-content">

  <div class="page-header">
    <div>
      <div class="page-title">Coverage</div>
      <div class="page-subtitle">Mirá qué datos hay disponibles para una coordenada, sin gastar cuota ni necesitar tu key.</div>
    </div>
  </div>

  <div class="card">
    <div class="coverage-form-row">
      <input class="input coverage-input" id="cov-lat" placeholder="lat (ej: -34.603)">
      <input class="input coverage-input" id="cov-lon" placeholder="lon (ej: -58.382)">
      <button class="btn btn-primary" id="btn-coverage">Consultar</button>
    </div>
    <div id="coverage-result" class="coverage-result" style="display:none"></div>
  </div>

</main>

<script src="/config/app.js"></script>
<script src="/vocab/domains.js"></script>
<script src="/src/api.js"></script>
<script src="/src/toast.js"></script>
<script src="/src/utils.js"></script>
<script src="/src/auth.js"></script>
<script src="/src/progress.js"></script>

<script>
(async () => {
  'use strict';
  const AUTH     = window.CAPIBARA_AUTH;
  const UTILS    = window.CAPIBARA_UTILS;
  const TOAST    = window.CAPIBARA_TOAST;
  const PROGRESS = window.CAPIBARA_PROGRESS;
  const DOMAINS  = window.CAPIBARA_DOMAINS;
  const BASE     = window.CAPIBARA_CONFIG.API_BASE;

  const user = await AUTH.requireAuth();
  if (!user) return;
  AUTH.renderNavUserMenu(document.getElementById('nav-user'), user);

  document.getElementById('btn-coverage').addEventListener('click', async () => {
    const lat    = document.getElementById('cov-lat').value.trim();
    const lon    = document.getElementById('cov-lon').value.trim();
    const result = document.getElementById('coverage-result');

    if (!lat || !lon) { TOAST.warn('Ingresá lat y lon'); return; }

    result.style.display = 'block';
    result.innerHTML = '<div class="inline-loading">Consultando…</div>';
    PROGRESS.start();

    try {
      const res  = await fetch(`${BASE}/geo/1/catalog/coverage?lat=${encodeURIComponent(lat)}&lon=${encodeURIComponent(lon)}`, { cache: 'no-store' });
      const data = await res.json();
      PROGRESS.done(!res.ok);

      if (!res.ok) {
        result.innerHTML = `<div class="coverage-error">Error ${res.status}: ${UTILS.escHtml(data.error || 'sin detalle')}</div>`;
        return;
      }

      if (!data.total_layers) {
        result.innerHTML = '<div class="coverage-empty">Sin datos publicados para esa coordenada.</div>';
        return;
      }

      const domainsHtml = Object.entries(data.coverage).map(([domain, layers]) => `
        <div class="coverage-domain">
          <div class="coverage-domain-title">${UTILS.escHtml(DOMAINS.label(domain))} (${layers.length})</div>
          ${layers.map(l => `
            <div class="coverage-layer-row">
              <div>
                <div class="coverage-layer-name">${UTILS.escHtml(l.layer_name)}</div>
                <div class="coverage-layer-source">${UTILS.escHtml(l.source_name)}</div>
              </div>
              <div class="coverage-layer-meta">${l.fields_count} campos · ${UTILS.escHtml(l.update_frequency || '—')}</div>
            </div>
          `).join('')}
        </div>
      `).join('');

      result.innerHTML = `
        <div class="coverage-summary">
          <strong>${data.total_layers}</strong> capas en <strong>${data.domains_covered}</strong> dominios · catálogo ${UTILS.escHtml(data.version)}
        </div>
        ${domainsHtml}
      `;
    } catch (e) {
      PROGRESS.done(true);
      result.innerHTML = `<div class="coverage-error">Error de red: ${UTILS.escHtml(e.message)}</div>`;
    }
  });
})();
</script>

</body>
</html>
