<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Capibara — Ingresar</title>
  <link rel="stylesheet" href="/style/base.css">
  <link rel="stylesheet" href="/style/buttons.css">
  <link rel="stylesheet" href="/style/login.css">
</head>
<body>

<div class="login-page">
  <div class="login-box">

    <!-- Logo -->
    <div class="login-logo">
      <span class="login-logo-text">Capibara</span>
    </div>
    <div class="login-tagline">Datos geoespaciales sobre una coordenada</div>

    <!-- Error de OAuth si viene ?error= en la URL -->
    <div class="login-error" id="error-msg" style="display:none"></div>

    <!-- Botón Google -->
    <a href="/api/auth/login" class="btn btn-google">
      <!-- Google logo SVG -->
      <svg width="18" height="18" viewBox="0 0 18 18" xmlns="http://www.w3.org/2000/svg">
        <path d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844c-.209 1.125-.843 2.078-1.796 2.717v2.258h2.908c1.702-1.567 2.684-3.875 2.684-6.615z" fill="#4285F4"/>
        <path d="M9 18c2.43 0 4.467-.806 5.956-2.18l-2.908-2.259c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332C2.438 15.983 5.482 18 9 18z" fill="#34A853"/>
        <path d="M3.964 10.71A5.41 5.41 0 013.682 9c0-.593.102-1.17.282-1.71V4.958H.957A8.996 8.996 0 000 9c0 1.452.348 2.827.957 4.042l3.007-2.332z" fill="#FBBC05"/>
        <path d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0 5.482 0 2.438 2.017.957 4.958L3.964 6.29C4.672 4.163 6.656 3.58 9 3.58z" fill="#EA4335"/>
      </svg>
      Ingresar con Google
    </a>

    <div class="login-footer">
      Solo se permite el ingreso con cuentas autorizadas por el administrador.
    </div>
  </div>
</div>

<script>
  // Mostrar error si viene en la URL
  const params = new URLSearchParams(window.location.search);
  const errMap = {
    oauth_denied:   'Acceso denegado por Google.',
    missing_code:   'El flujo de autenticación fue interrumpido.',
    token_exchange: 'Error al verificar el código de Google.',
    profile_fetch:  'No se pudo obtener el perfil de Google.',
    no_email:       'La cuenta de Google no tiene email visible.',
    server_error:   'Error interno del servidor. Intentá de nuevo.',
  };
  const errKey = params.get('error');
  if (errKey) {
    const el = document.getElementById('error-msg');
    el.textContent = errMap[errKey] || `Error: ${errKey}`;
    el.style.display = 'block';
  }
</script>

</body>
</html>
