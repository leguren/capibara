<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Capibara — Dashboard</title>
  <link rel="stylesheet" href="/style/base.css">
  <link rel="stylesheet" href="/style/buttons.css">
  <link rel="stylesheet" href="/style/components.css">
  <link rel="stylesheet" href="/style/toast.css">
  <link rel="stylesheet" href="/style/dashboard.css">
</head>
<body>

<nav class="navbar">
  <a href="/home" class="navbar-brand">Capibara</a>
  <div class="navbar-nav">
    <a href="/playground" class="navbar-link">Playground</a>
    <a href="/coverage"   class="navbar-link">Coverage</a>
    <a href="/keys"       class="navbar-link">Keys</a>
    <a href="/dashboard"  class="navbar-link is-active">Dashboard</a>
    <a href="/docs"       class="navbar-link">Docs</a>
  </div>
  <div class="navbar-spacer"></div>
  <a href="/settings" class="navbar-icon-btn" title="Ajustes" aria-label="Ajustes">⚙</a>
  <div class="navbar-user" id="nav-user"></div>
</nav>

<main class="page-content">

  <div class="page-header">
    <div>
      <div class="page-title">Dashboard</div>
      <div class="page-subtitle">Métricas de uso de tu cuenta.</div>
    </div>
    <div id="api-status-badge" class="status-badge status-badge-loading">Verificando API…</div>
  </div>

  <!-- Uso -->
  <div class="card">
    <div class="card-header">
      <div class="card-title">Uso (últimos 7 días)</div>
      <span class="dash-stat-chip" id="stat-total">— requests</span>
    </div>
    <div id="usage-chart" class="usage-chart">
      <div class="inline-loading">Cargando…</div>
    </div>
    <div class="usage-stats-row">
      <span>Promedio: <strong id="stat-avg">—</strong> ms</span>
      <span id="stat-errors-wrap" style="display:none">Errores: <strong id="stat-errors">—</strong></span>
    </div>
  </div>

  <!-- Logs / changelog de publicaciones -->
  <div class="card mt-16">
    <div class="card-title mb-10">Últimas publicaciones</div>
    <div id="changelog-list"><div class="inline-loading">Cargando…</div></div>
  </div>

</main>

<script src="/config/app.js"></script>
<script src="/src/api.js"></script>
<script src="/src/toast.js"></script>
<script src="/src/utils.js"></script>
<script src="/src/auth.js"></script>
<script src="/src/progress.js"></script>

<script>
(async () => {
  'use strict';
  const AUTH  = window.CAPIBARA_AUTH;
  const API   = window.CAPIBARA_API;
  const UTILS = window.CAPIBARA_UTILS;

  const user = await AUTH.requireAuth();
  if (!user) return;
  AUTH.renderNavUserMenu(document.getElementById('nav-user'), user);

  // ── Estado de la API ───────────────────────────────────────────────────
  const badge = document.getElementById('api-status-badge');
  API.getApiStatus().then(({ data, ok }) => {
    badge.classList.remove('status-badge-loading');
    if (!ok || !data?.latest_pub) {
      badge.className = 'status-badge status-badge-warn';
      badge.textContent = 'Sin publicación activa';
      return;
    }
    const age = UTILS.timeAgo(data.latest_pub.created_at);
    if (data.status === 'ok') {
      badge.className = 'status-badge status-badge-ok';
      badge.textContent = `API operativa · ${data.latest_pub.version} · ${age}`;
    } else {
      badge.className = 'status-badge status-badge-warn';
      badge.textContent = `Catálogo desactualizado · ${data.latest_pub.version} · ${age}`;
    }
  });

  // ── Uso ────────────────────────────────────────────────────────────────
  API.getUserUsage(7).then(({ data, ok }) => {
    if (!ok) return;
    document.getElementById('stat-total').textContent = `${(data.total_requests || 0).toLocaleString('es')} requests`;
    document.getElementById('stat-avg').textContent   = data.avg_response_ms;
    if (data.total_requests > 0) {
      document.getElementById('stat-errors-wrap').style.display = '';
    }

    // Gráfico de barras
    const chart = document.getElementById('usage-chart');
    if (!data.by_day?.length) {
      chart.innerHTML = '<span class="usage-chart-empty">Sin actividad en los últimos 7 días</span>';
      return;
    }
    const max = Math.max(...data.by_day.map(d => d.requests), 1);
    chart.innerHTML = data.by_day.map(d => {
      const pct = Math.round(d.requests / max * 100);
      const day = d.day.slice(5); // MM-DD
      return `<div class="usage-bar-col">
        <span class="usage-bar-label">${d.requests}</span>
        <div class="usage-bar-fill" style="height:${Math.max(pct*0.56,2)}px"></div>
        <span class="usage-bar-label">${day}</span>
      </div>`;
    }).join('');
  });

  // ── Changelog ──────────────────────────────────────────────────────────
  API.getChangelog().then(({ data, ok }) => {
    const el = document.getElementById('changelog-list');
    if (!ok || !data?.publications?.length) {
      el.innerHTML = '<span class="usage-chart-empty">Sin publicaciones aún.</span>';
      return;
    }
    el.innerHTML = data.publications.map(p => `
      <div class="changelog-item">
        <div class="changelog-item-header">
          <strong class="changelog-version">${UTILS.escHtml(p.version_label)}</strong>
          <span class="changelog-date">${UTILS.timeAgo(p.created_at)}</span>
        </div>
        <div class="changelog-meta">${p.layers_count} capas · ${p.fields_count} campos</div>
        ${p.notes ? `<div class="changelog-notes">${UTILS.escHtml(p.notes)}</div>` : ''}
      </div>
    `).join('');
  });
})();
</script>

</body>
</html>
